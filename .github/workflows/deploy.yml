name: Auto Deploy to EC2

on:
  push:
    branches:
      - hanbi

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            echo "🚀 배포 시작..."
            cd /home/ec2-user/OOTD-LOGIC

            # 최신 코드 받기
            git pull origin hanbi

            # 백엔드 디렉토리로 이동
            cd backend

            # 기존 프로세스 종료
            fuser -k 8095/tcp || true
            sleep 2

            # 빌드
            echo "🔨 빌드 중..."
            chmod +x gradlew
            ./gradlew build -x test

            # 실행
            echo "▶️ 애플리케이션 시작..."
            nohup java -jar build/libs/demo-0.0.1-SNAPSHOT.jar > app.log 2>&1 &

            sleep 3

            # 배포 완료 확인
            if pgrep -f "demo-0.0.1-SNAPSHOT.jar" > /dev/null; then
              echo "✅ 배포 완료! (PID: $(pgrep -f demo-0.0.1-SNAPSHOT.jar))"
            else
              echo "❌ 배포 실패!"
              tail -20 app.log
              exit 1
            fi

      - name: Notify Success
        if: success()
        run: echo "✅ EC2 배포 성공! (IP: ${{ secrets.EC2_HOST }})"

      - name: Notify Failure
        if: failure()
        run: echo "❌ EC2 배포 실패! 로그를 확인하세요."
