<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OOTD-LOGIC | 로그인</title>
  <link rel="stylesheet" href="css/29cm-style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--gray-100);
    }

    .login-container {
      background: var(--white);
      padding: 48px;
      border: 1px solid var(--border);
      border-radius: 4px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .login-header p {
      font-size: 13px;
      color: var(--gray-700);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--black);
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: var(--black);
      color: var(--white);
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .login-btn:hover {
      background: var(--gray-700);
    }

    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
    }

    .login-footer a {
      color: var(--black);
      text-decoration: none;
      transition: color 0.2s;
    }

    .login-footer a:hover {
      color: var(--gray-700);
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }

    .checkbox-group input {
      width: 16px;
      height: 16px;
      margin-right: 8px;
    }

    .checkbox-group span {
      font-size: 12px;
      color: var(--gray-700);
    }

    .error-message {
      display: none;
      color: #d32f2f;
      font-size: 12px;
      margin-top: 4px;
    }

    .status-message {
      margin: 12px 0 0;
      font-size: 12px;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>OOTD-LOGIC</h1>
      <p>로그인</p>
    </div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required>
        <div class="error-message"></div>
      </div>

      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" name="password" placeholder="비밀번호" required minlength="8">
        <div class="error-message"></div>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="rememberMe">
        <span>로그인 상태 유지</span>
      </div>

      <button type="submit" class="login-btn">로그인</button>
    </form>

    <div class="status-message" id="statusMessage"></div>

    <div class="login-footer">
      <p>계정이 없으신가요? <a href="signup.html">회원가입</a></p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
