spring:
  application:
    name: ootd-backend

gemini:
  api:
    key: ${GEMINI_API_KEY:test-api-key}

weather:
  api:
    url: http://apis.data.go.kr/1360000/AsosDalyInfoService/getWthrDataList
    key: ${WEATHER_API_KEY:4fcae2c8428ca24acdcb51607fa7baaf53dcfa139aa65e35ded46cf0cc4ea4d8}
    station-id: 108

air-quality:
  api:
    url: http://apis.data.go.kr/B552584/ArpltnInforInqireSvc
    key: ${AIR_QUALITY_API_KEY:}

jwt:
  secret: ${JWT_SECRET_KEY:your-secret-key-minimum-256-bits-long-change-in-production}
  expiration: 3600000
  refreshExpiration: 604800000

aws:
  dynamodb:
    region: ap-northeast-2
    init-tables: true
  bedrock:
    region: us-east-1
    model-id: us.anthropic.claude-3-haiku-20240307-v1:0

server:
  port: 8095
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  compression:
    enabled: true

logging:
  level:
    com.trion.ootd: DEBUG
    org.springframework: WARN
    software.amazon.awssdk: DEBUG
