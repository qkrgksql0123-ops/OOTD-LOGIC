<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OOTD-LOGIC | 회원가입</title>
  <link rel="stylesheet" href="css/29cm-style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--gray-100);
      padding: 20px 0;
    }

    .signup-container {
      background: var(--white);
      padding: 48px;
      border: 1px solid var(--border);
      border-radius: 4px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .signup-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .signup-header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .signup-header p {
      font-size: 13px;
      color: var(--gray-700);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--black);
    }

    .style-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .style-tags label {
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 12px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--gray-100);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      text-transform: none;
      transition: all 0.2s;
    }

    .style-tags label:hover {
      border-color: var(--black);
      background: var(--white);
    }

    .style-tags input {
      width: auto;
      margin: 0;
      accent-color: var(--black);
    }

    .checkbox-group {
      display: flex;
      align-items: flex-start;
      margin-bottom: 20px;
      gap: 8px;
    }

    .checkbox-group input {
      width: 16px;
      height: 16px;
      margin-top: 2px;
      flex-shrink: 0;
    }

    .checkbox-group span {
      font-size: 12px;
      color: var(--gray-700);
      line-height: 1.4;
    }

    .signup-btn {
      width: 100%;
      padding: 12px;
      background: var(--black);
      color: var(--white);
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .signup-btn:hover {
      background: var(--gray-700);
    }

    .signup-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
    }

    .signup-footer a {
      color: var(--black);
      text-decoration: none;
      transition: color 0.2s;
    }

    .signup-footer a:hover {
      color: var(--gray-700);
    }

    .error-message {
      display: none;
      color: #d32f2f;
      font-size: 11px;
      margin-top: 4px;
    }

    .status-message {
      margin: 12px 0 0;
      font-size: 12px;
      min-height: 16px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="signup-container">
    <div class="signup-header">
      <h1>OOTD-LOGIC</h1>
      <p>회원가입</p>
    </div>

    <form id="signupForm" novalidate>
      <div class="form-group">
        <label for="nickname">닉네임</label>
        <input type="text" id="nickname" name="nickname" placeholder="예: style_mina" required minlength="2" maxlength="20">
        <div class="error-message"></div>
      </div>

      <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required>
        <div class="error-message"></div>
      </div>

      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" name="password" placeholder="8자 이상" required minlength="8">
        <div class="error-message"></div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">비밀번호 확인</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="비밀번호 재입력" required minlength="8">
        <div class="error-message"></div>
      </div>

      <div class="form-group">
        <label>주요 스타일</label>
        <div class="style-tags">
          <label><input type="checkbox" name="style" value="미니멀"> 미니멀</label>
          <label><input type="checkbox" name="style" value="스트릿"> 스트릿</label>
        </div>
        <div class="style-tags">
          <label><input type="checkbox" name="style" value="캐주얼"> 캐주얼</label>
          <label><input type="checkbox" name="style" value="포멀"> 포멀</label>
          <label><input type="checkbox" name="style" value="빈티지"> 빈티지</label>
        </div>
        <div class="error-message" id="styleError"></div>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="agree" required>
        <span>이용약관 및 개인정보 처리방침에 동의합니다.</span>
      </div>
      <div class="error-message" id="agreeError"></div>

      <button type="submit" class="signup-btn">회원가입</button>
    </form>

    <div class="status-message" id="statusMessage"></div>

    <div class="signup-footer">
      <p>이미 계정이 있으신가요? <a href="login.html">로그인</a></p>
    </div>
  </div>

  <script src="js/signup.js"></script>
</body>
</html>
